name: nhstyx_customer
description: "NH Styx — B2B wholesale ordering app for garment & boutique store owners."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  razorpay_flutter: ^1.4.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Formatting (currency, dates)
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
